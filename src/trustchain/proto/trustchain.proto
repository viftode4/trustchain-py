// TrustChain wire protocol schema.
//
// This file serves as documentation for the binary wire format.
// Python code uses manual field mapping with struct-based encoding
// rather than protoc-generated stubs.
//
// Reference: IETF draft-pouwelse-trustchain-01

syntax = "proto3";
package trustchain;

// A single half-block in the TrustChain.
// Each agent creates and signs their own half-block independently.
message HalfBlockProto {
  string public_key = 1;           // Ed25519 pubkey hex of block owner
  uint64 sequence_number = 2;      // 1-based, monotonically increasing
  string link_public_key = 3;      // counterparty pubkey
  uint64 link_sequence_number = 4; // counterparty seq (0 = proposal)
  string previous_hash = 5;        // hash of owner's previous block
  string signature = 6;            // Ed25519 signature hex
  string block_type = 7;           // "proposal", "agreement", "checkpoint"
  bytes transaction = 8;           // JSON-encoded transaction data
  string block_hash = 9;           // SHA-256 of all fields with sig zeroed
  double timestamp = 10;           // Unix timestamp
}

// Proposal: sent from A to B to initiate a transaction.
message ProposeMessage {
  HalfBlockProto block = 1;
}

// Agreement: sent from B back to A after validating a proposal.
message AgreeMessage {
  HalfBlockProto block = 1;
  bool accepted = 2;
  string error = 3;
}

// Request to crawl a peer's chain.
message CrawlRequest {
  string public_key = 1;
  uint64 start_seq = 2;
  uint32 limit = 3;
}

// Response containing chain blocks.
message CrawlResponse {
  repeated HalfBlockProto blocks = 1;
}

// Information about a known peer.
message PeerInfo {
  string public_key = 1;
  string host = 2;
  uint32 port = 3;
  double last_seen = 4;
}

// Exchange of known peers for discovery.
message PeerExchange {
  repeated PeerInfo peers = 1;
}

// Request for node status.
message StatusRequest {}

// Node status response.
message StatusResponse {
  string public_key = 1;
  uint64 chain_length = 2;
  uint64 total_blocks = 3;
  repeated string peer_keys = 4;
}

// Wire envelope wrapping any message type.
message Envelope {
  uint32 msg_type = 1;       // MessageType enum value
  bytes payload = 2;         // Serialized inner message
  string sender_pubkey = 3;  // Sender's Ed25519 pubkey hex
  double timestamp = 4;      // Unix timestamp
}
