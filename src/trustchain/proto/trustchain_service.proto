// TrustChain gRPC service definition.
//
// Provides high-performance RPC interface for agent-to-node communication.
// Supports both unary calls and server-streaming for chain crawling.

syntax = "proto3";
package trustchain;
import "trustchain.proto";

service TrustChainService {
  // Core protocol: send proposal, receive agreement
  rpc Propose (ProposeMessage) returns (AgreeMessage);

  // Receive an agreement (acknowledgement)
  rpc Agree (AgreeMessage) returns (AgreeMessage);

  // Chain queries: stream blocks for a given pubkey
  rpc CrawlChain (CrawlRequest) returns (stream HalfBlockProto);

  // Get a specific block
  rpc GetBlock (CrawlRequest) returns (HalfBlockProto);

  // Node management
  rpc GetStatus (StatusRequest) returns (StatusResponse);

  // Get known peers
  rpc GetPeers (StatusRequest) returns (PeerExchange);

  // Trust queries
  rpc GetTrustScore (TrustScoreRequest) returns (TrustScoreResponse);
}

message TrustScoreRequest {
  string target_pubkey = 1;
}

message TrustScoreResponse {
  string target_pubkey = 1;
  double trust_score = 2;
  double chain_integrity = 3;
  double netflow_score = 4;
  uint64 interaction_count = 5;
}
